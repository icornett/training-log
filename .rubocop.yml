require:
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - "vendor/**/*"
    - "Gemfile"

# Relax length cops in specs — describe blocks and let chains get long
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 15

# RSpec cops that are impractical for integration/e2e tests
RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NestedGroups:
  Max: 4

# Sinatra routes use blocks extensively; allow slightly longer classes
Metrics/ClassLength:
  Max: 200
