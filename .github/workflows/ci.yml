name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate TypeScript App
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: API tests
        run: npm run test:api:ci

      - name: Frontend tests
        run: npm run test:web:ci

      - name: Mobile e2e tests
        run: npm run test:e2e:mobile

      - name: Build frontend and API
        run: npm run build && npm run build:api

      - name: Prepare local Postgres for SQLite E2E
        run: npm run db:local:prepare

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: SQLite E2E tests
        run: |
          npm run dev:api:func:localdb > /tmp/func.log 2>&1 &
          API_PID=$!
          npm run dev:swa:proxy > /tmp/swa.log 2>&1 &
          SWA_PID=$!
          trap 'kill "$API_PID" "$SWA_PID" || true' EXIT
          npx wait-on http://127.0.0.1:7071 http://127.0.0.1:4280 --timeout 90000

          echo "Waiting for API routes to be ready behind SWA proxy..."
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4280/api/account || true)
            if [ "$status" = "401" ]; then
              echo "API is ready (GET /api/account -> 401)."
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "API route readiness check failed. Last status: $status"
              echo "--- API log tail ---"
              tail -n 120 /tmp/func.log || true
              echo "--- SWA log tail ---"
              tail -n 120 /tmp/swa.log || true
              exit 1
            fi

            sleep 2
          done

          BASE_URL=http://127.0.0.1:4280 npm run test:e2e:sqlite
        env:
          SESSION_SECRET: ci-local-session-secret
          AzureWebJobsStorage: UseDevelopmentStorage=true
          FUNCTIONS_WORKER_RUNTIME: node
          DISABLE_TIMER_TRIGGERS: 'true'

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test-results/*.xml'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Build
        run: npm run build

  version:
    name: Auto Semver Tag
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  notify-deploy:
    name: Trigger ae-bootcamp-demo Deployment
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.new_tag != ''
    steps:
      - name: Dispatch deployment workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AE_BOOTCAMP_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'icornett',
              repo: 'ae-bootcamp-demo',
              event_type: 'training-log-release',
              client_payload: {
                tag: '${{ needs.version.outputs.new_tag }}',
                sha: context.sha,
                source_repo: context.repo.owner + '/' + context.repo.repo,
              },
            });
