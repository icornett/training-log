name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate TypeScript App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: API tests
        run: npm run test:api:ci

      - name: Frontend tests
        run: npm run test:web:ci

      - name: Build frontend and API
        run: npm run build && npm run build:api

  mobile-e2e:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Mobile e2e tests
        run: npm run test:e2e:mobile

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test-results/e2e-junit.xml'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-mobile
          path: test-results/
          if-no-files-found: ignore

  localdb-e2e:
    name: Local DB E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Local DB E2E tests
        run: |
          npm run db:localdb:stack:prepare
          sh ./bin/run-localdb-e2e.sh
        env:
          SESSION_SECRET: ci-local-session-secret
          AzureWebJobsStorage: UseDevelopmentStorage=true
          FUNCTIONS_WORKER_RUNTIME: node
          DISABLE_TIMER_TRIGGERS: 'true'

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test-results/*.xml'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-localdb
          path: test-results/
          if-no-files-found: ignore

  version:
    name: Auto Semver Tag
    runs-on: ubuntu-latest
    needs: [validate, mobile-e2e, localdb-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  notify-deploy:
    name: Trigger ae-bootcamp-demo Deployment
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.new_tag != ''
    steps:
      - name: Dispatch deployment workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AE_BOOTCAMP_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'icornett',
              repo: 'ae-bootcamp-demo',
              event_type: 'training-log-release',
              client_payload: {
                tag: '${{ needs.version.outputs.new_tag }}',
                sha: context.sha,
                source_repo: context.repo.owner + '/' + context.repo.repo,
              },
            });
