name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate TypeScript App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: API tests
        run: npm run test:api:ci

      - name: Frontend tests
        run: npm run test:web:ci

      - name: Build frontend and API
        run: npm run build && npm run build:api

  mobile-e2e:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Compute Postgres image manifest fingerprint
        id: docker-manifest-hash-mobile
        run: |
          set -eu
          POSTGRES_IMAGE="postgres:16-alpine"
          postgres_hash="$(docker manifest inspect "${POSTGRES_IMAGE}" | sha256sum | awk '{print $1}')"
          echo "postgres_hash=${postgres_hash}" >> "${GITHUB_OUTPUT}"

      - name: Restore cached Postgres image
        id: docker-cache-postgres-mobile
        uses: actions/cache@v6
        with:
          path: /tmp/.docker-cache/postgres
          key: docker-${{ runner.os }}-postgres-16-alpine-${{ steps.docker-manifest-hash-mobile.outputs.postgres_hash }}

      - name: Load or pull Postgres image
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          if [ -f /tmp/.docker-cache/postgres/postgres-16-alpine.tar ]; then
            docker load -i /tmp/.docker-cache/postgres/postgres-16-alpine.tar
          else
            docker pull postgres:16-alpine
          fi

      - name: Save Postgres image to cache
        if: steps.docker-cache-postgres-mobile.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          docker save postgres:16-alpine -o /tmp/.docker-cache/postgres/postgres-16-alpine.tar

      - name: Start Postgres container
        run: |
          docker run -d --rm \
            --name training-log-mobile-postgres \
            -e POSTGRES_USER=traininglog \
            -e POSTGRES_PASSWORD=traininglog \
            -e POSTGRES_DB=training_log \
            -p 5432:5432 \
            postgres:16-alpine

      - name: Wait for Postgres readiness
        run: |
          for i in $(seq 1 30); do
            if docker exec training-log-mobile-postgres pg_isready -U traininglog -d training_log >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for Postgres."
          docker logs training-log-mobile-postgres || true
          exit 1

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply database schema
        run: |
          npm install -g wait-port
          wait-port 127.0.0.1:5432 --timeout 30000
          PGPASSWORD=traininglog psql -h 127.0.0.1 -U traininglog -d training_log -f schema.sql

      - name: Build API and Frontend
        run: npm run build && npm run build:api

      - name: Mobile e2e tests
        run: |
          npm run dev:api:func >/tmp/func.log 2>&1 &
          API_PID=$!
          cleanup() {
            kill "${API_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM
          if ! npx wait-on http://127.0.0.1:7071 --timeout 90000; then
            echo "Backend failed to start. Function logs:"
            cat /tmp/func.log
            exit 1
          fi
          sleep 2
          npm run test:e2e:mobile
        env:
          SESSION_SECRET: ci-mobile-session-secret
          AzureWebJobsStorage: UseDevelopmentStorage=true
          FUNCTIONS_WORKER_RUNTIME: node
          DISABLE_TIMER_TRIGGERS: "true"
          DATABASE_URL: postgresql://traininglog:traininglog@127.0.0.1:5432/training_log?sslmode=disable

      - name: Stop Postgres container
        if: always()
        run: docker stop training-log-mobile-postgres || true

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "test-results/e2e-junit.xml"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-mobile
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-mobile
          path: test-results/
          if-no-files-found: ignore

  localdb-e2e:
    name: Local DB E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Compute Postgres image manifest fingerprint
        id: docker-manifest-hash
        run: |
          set -eu
          POSTGRES_IMAGE="postgres:16-alpine"

          postgres_hash="$(docker manifest inspect "${POSTGRES_IMAGE}" | sha256sum | awk '{print $1}')"

          echo "postgres_hash=${postgres_hash}" >> "${GITHUB_OUTPUT}"

      - name: Restore cached Postgres image
        id: docker-cache-postgres
        uses: actions/cache@v6
        with:
          path: /tmp/.docker-cache/postgres
          key: docker-${{ runner.os }}-postgres-16-alpine-${{ steps.docker-manifest-hash.outputs.postgres_hash }}

      - name: Load or pull Postgres image
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          if [ -f /tmp/.docker-cache/postgres/postgres-16-alpine.tar ]; then
            docker load -i /tmp/.docker-cache/postgres/postgres-16-alpine.tar
          else
            docker pull postgres:16-alpine
          fi

      - name: Save Postgres image to cache
        if: steps.docker-cache-postgres.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          docker save postgres:16-alpine -o /tmp/.docker-cache/postgres/postgres-16-alpine.tar

      - name: Local DB E2E tests
        run: |
          npm run db:localdb:stack:prepare
          sh ./bin/run-localdb-e2e.sh
        env:
          SESSION_SECRET: ci-local-session-secret
          AzureWebJobsStorage: UseDevelopmentStorage=true
          FUNCTIONS_WORKER_RUNTIME: node
          DISABLE_TIMER_TRIGGERS: "true"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "test-results/*.xml"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-localdb
          path: test-results/
          if-no-files-found: ignore

  version:
    name: Auto Semver Tag
    runs-on: ubuntu-latest
    needs: [validate, mobile-e2e, localdb-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  notify-deploy:
    name: Trigger ae-bootcamp-demo Deployment
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.new_tag != ''
    steps:
      - name: Dispatch deployment workflow
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.AE_BOOTCAMP_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'icornett',
              repo: 'ae-bootcamp-demo',
              event_type: 'training-log-release',
              client_payload: {
                tag: '${{ needs.version.outputs.new_tag }}',
                sha: context.sha,
                source_repo: context.repo.owner + '/' + context.repo.repo,
              },
            });

  notify-staging-pr:
    name: Trigger Staging Deploy For PR
    runs-on: ubuntu-latest
    needs: [validate, mobile-e2e, localdb-e2e]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Dispatch staging deployment workflow
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.AE_BOOTCAMP_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'icornett',
              repo: 'ae-bootcamp-demo',
              event_type: 'training-log-pr-staging',
              client_payload: {
                pr_number: context.payload.pull_request.number,
                sha: context.payload.pull_request.head.sha,
                ref: context.payload.pull_request.head.ref,
                source_repo: context.repo.owner + '/' + context.repo.repo,
              },
            });
