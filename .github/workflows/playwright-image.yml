name: Playwright Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "docker/playwright/Dockerfile"
      - ".github/workflows/playwright-image.yml"
  pull_request:
    paths:
      - "docker/playwright/Dockerfile"
      - ".github/workflows/playwright-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    name: Build, Test, and Publish Playwright Image
    runs-on: ubuntu-latest
    env:
      LOCAL_IMAGE: training-log-playwright:ci
      DOCKERFILE_PATH: docker/playwright/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image metadata
        id: meta
        run: |
          set -eu
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/training-log-playwright"
          sha_tag="sha-${GITHUB_SHA::12}"

          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${sha_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build image locally
        run: |
          docker buildx build \
            --build-arg PLAYWRIGHT_VERSION=1.61.1 \
            --cache-from type=gha,scope=playwright-image \
            --cache-to type=gha,mode=max,scope=playwright-image \
            --load \
            -f "${DOCKERFILE_PATH}" \
            -t "${LOCAL_IMAGE}" \
            .

      - name: Verify Playwright browsers in image
        run: |
          docker run --rm "${LOCAL_IMAGE}" bash -lc '
            set -eu
            playwright --version
            playwright install --list
            playwright install --list | grep -Eq "/ms-playwright/chromium-|/ms-playwright/firefox-|/ms-playwright/webkit-"
          '

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          set -eu
          IMAGE_REPO='${{ steps.meta.outputs.image_repo }}'

          tags='${{ steps.meta.outputs.sha_tag }}'

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags} latest"
          fi

          if echo "${GITHUB_REF}" | grep -q '^refs/tags/v'; then
            release_tag="${GITHUB_REF#refs/tags/}"
            tags="${tags} ${release_tag}"
          fi

          for tag in ${tags}; do
            docker tag "${LOCAL_IMAGE}" "${IMAGE_REPO}:${tag}"
            docker push "${IMAGE_REPO}:${tag}"
          done
